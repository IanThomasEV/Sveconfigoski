#cloud-config

# ============================================================
#  Cloud-init — yprius.be Docker Node
#  Hostname  : alfa
#  Gebruiker : kingsman
#  Docker    : Rootless mode (draait NIET als root)
# ============================================================

hostname: alfa
fqdn: alfa.yprius.be
manage_etc_hosts: true

# ============================================================
#  GEBRUIKERS
# ============================================================
users:
  # --- Hoofdgebruiker ---
  - name: kingsman
    gecos: Beheerder
    groups: [sudo]
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKUIFa7mg2IGccSGIAx1DYqKiZydA2Q1kVeA23KPzHla it@Tapo-P10

  # --- Dedicated Docker service user ---
  # Geen sudo, geen login shell, geen SSH — puur voor rootless Docker daemon
  - name: dockeruser
    gecos: Docker Service User
    groups: []
    shell: /bin/false
    lock_passwd: true
    no_create_home: false

disable_root: true

# ============================================================
#  PAKKETTEN
# ============================================================
package_update: true
package_upgrade: true
package_reboot_if_required: false

packages:
  - curl
  - wget
  - git
  - gnupg
  - ca-certificates
  - apt-transport-https
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-listchanges
  - logwatch
  - auditd
  - libpam-pwquality
  - rkhunter
  - chkrootkit
  - lynis
  - aide
  - acl
  - htop
  - net-tools
  - jq
  - uidmap
  - dbus-user-session

# ============================================================
#  BESTANDEN
# ============================================================
write_files:

  # --- SSH Banner (voor login) ---
  - path: /etc/issue.net
    content: |
      *******************************************************************
      *                    WELKOM BIJ YPRIUS.BE                         *
      *                                                                 *
      *   Toegang uitsluitend voor geautoriseerde gebruikers.           *
      *   Alle activiteiten op dit systeem worden gelogd, bewaakt,      *
      *   en kunnen worden gebruikt voor audits of juridische           *
      *   procedures. Ongeautoriseerde toegang is verboden en kan       *
      *   leiden tot disciplinaire en/of strafrechtelijke acties.       *
      *                                                                 *
      *   Door in te loggen erkent u dat u volledig bent geïnformeerd   *
      *   over en akkoord gaat met het beveiligingsbeleid van           *
      *   yprius.be.                                                    *
      *                                                                 *
      *            ·  ·  ·  ·  ·  ·  ·  ·  ·  ·  ·  ·  ·                *
      *                                                                 *
      *                   WELCOME TO YPRIUS.BE                          *
      *                                                                 *
      *   Access is strictly limited to authorized personnel only.      *
      *   All activities on this system are logged, monitored, and      *
      *   may be used for auditing or legal purposes. Unauthorized      *
      *   access is prohibited and may result in disciplinary and/or    *
      *   criminal action.                                              *
      *                                                                 *
      *   By logging in, you acknowledge that you are aware of and      *
      *   agree to comply with the security policies of yprius.be.      *
      *                                                                 *
      *******************************************************************

  # --- MOTD script (na login) ---
  - path: /etc/update-motd.d/99-yprius
    permissions: '0755'
    content: |
      #!/bin/bash
      GREEN='\033[0;32m'
      RED='\033[0;31m'
      YELLOW='\033[1;33m'
      CYAN='\033[0;36m'
      BOLD='\033[1m'
      NC='\033[0m'

      HOSTNAME=$(hostname)
      IP=$(hostname -I | awk '{print $1}')
      UPTIME=$(uptime -p)
      LOAD=$(awk '{print $1}' /proc/loadavg)
      MEM_TOTAL=$(free -m | awk '/Mem:/ {print $2}')
      MEM_USED=$(free -m | awk '/Mem:/ {print $3}')
      MEM_PCT=$(free -m | awk '/Mem:/ { printf("%.1f%%", $3/$2*100) }')
      DISK_USAGE=$(df -h / | awk 'NR==2 {print $5}')
      DISK_FREE=$(df -h / | awk 'NR==2 {print $4}')
      KERNEL=$(uname -r)
      LAST_LOGIN=$(last -n 2 "$USER" | awk 'NR==2 {print $3, $4, $5, $6, $7}')

      echo -e "${CYAN}${BOLD}"
      echo "  ██╗   ██╗██████╗ ██████╗ ██╗██╗   ██╗███████╗"
      echo "  ╚██╗ ██╔╝██╔══██╗██╔══██╗██║██║   ██║██╔════╝"
      echo "   ╚████╔╝ ██████╔╝██████╔╝██║██║   ██║███████╗"
      echo "    ╚██╔╝  ██╔═══╝ ██╔══██╗██║██║   ██║╚════██║"
      echo "     ██║   ██║     ██║  ██║██║╚██████╔╝███████║"
      echo "     ╚═╝   ╚═╝     ╚═╝  ╚═╝╚═╝ ╚═════╝ ╚══════╝"
      echo -e "${NC}"
      echo -e " ${BOLD}$HOSTNAME${NC}  —  ${CYAN}$IP${NC}"
      echo -e " Kernel: $KERNEL"
      echo ""

      echo -e "${BOLD}┌─────────────────────── SYSTEEM ───────────────────────────┐${NC}"
      echo -e "  Uptime      : $UPTIME"
      echo -e "  Load        : $LOAD"
      echo -e "  Geheugen    : ${MEM_USED}MB / ${MEM_TOTAL}MB  (${MEM_PCT})"
      echo -e "  Schijf (/)  : $DISK_USAGE gebruikt  |  $DISK_FREE vrij"
      echo -e "  Laatste login: $LAST_LOGIN"
      echo -e "${BOLD}└───────────────────────────────────────────────────────────┘${NC}"
      echo ""

      echo -e "${BOLD}┌─────────────────────── DOCKER (rootless) ─────────────────┐${NC}"
      DOCKER_UID=$(id -u dockeruser 2>/dev/null)
      if [ -n "$DOCKER_UID" ] && [ -S "/run/user/${DOCKER_UID}/docker.sock" ]; then
        DOCK="sudo -u dockeruser DOCKER_HOST=unix:///run/user/${DOCKER_UID}/docker.sock docker"
        RUNNING=$($DOCK ps -q 2>/dev/null | wc -l)
        TOTAL=$($DOCK ps -aq 2>/dev/null | wc -l)
        STOPPED=$((TOTAL - RUNNING))
        if [ "$TOTAL" -eq 0 ]; then
          echo -e "  Geen containers gevonden."
        else
          echo -e "  Actief  : ${GREEN}${RUNNING} draaiend${NC}   |   Gestopt: ${RED}${STOPPED}${NC}"
          echo ""
          $DOCK ps --format "  • {{.Names}}\t{{.Status}}\t{{.Image}}" 2>/dev/null
        fi
      else
        echo -e "  ${RED}Docker daemon niet bereikbaar${NC}"
      fi
      echo -e "${BOLD}└───────────────────────────────────────────────────────────┘${NC}"
      echo ""

      echo -e "${BOLD}┌─────────────────────── SECURITY ──────────────────────────┐${NC}"
      if command -v cscli &>/dev/null; then
        BANS=$(cscli decisions list -o raw 2>/dev/null | tail -n +2 | wc -l)
        ALERTS=$(cscli alerts list -o raw 2>/dev/null | tail -n +2 | wc -l)
        echo -e "  CrowdSec  : ${GREEN}Actief${NC}  |  Bans: ${RED}${BANS}${NC}  |  Alerts: ${YELLOW}${ALERTS}${NC}"
      else
        echo -e "  CrowdSec  : ${RED}Niet gevonden${NC}"
      fi
      if systemctl is-active --quiet wazuh-agent 2>/dev/null; then
        echo -e "  Wazuh     : ${GREEN}Agent actief${NC}"
      else
        echo -e "  Wazuh     : ${RED}Agent niet actief${NC}"
      fi
      if command -v fail2ban-client &>/dev/null; then
        F2B_BANS=$(fail2ban-client status sshd 2>/dev/null | grep "Total banned" | awk '{print $NF}')
        echo -e "  Fail2ban  : ${GREEN}Actief${NC}  |  SSH bans totaal: ${F2B_BANS:-0}"
      fi
      UPDATES=$(apt list --upgradable 2>/dev/null | grep -c upgradable || echo 0)
      if [ "$UPDATES" -gt 0 ]; then
        echo -e "  Updates   : ${RED}${UPDATES} pakketten beschikbaar${NC}"
      else
        echo -e "  Updates   : ${GREEN}Volledig up-to-date${NC}"
      fi
      echo -e "${BOLD}└───────────────────────────────────────────────────────────┘${NC}"
      echo ""

  # --- Wrapper: kingsman typt gewoon 'docker', wordt doorgestuurd naar rootless daemon ---
  - path: /usr/local/bin/docker
    permissions: '0755'
    content: |
      #!/bin/bash
      DOCKER_UID=$(id -u dockeruser)
      exec sudo -u dockeruser DOCKER_HOST=unix:///run/user/${DOCKER_UID}/docker.sock /usr/bin/docker "$@"

  - path: /usr/local/bin/docker-compose
    permissions: '0755'
    content: |
      #!/bin/bash
      DOCKER_UID=$(id -u dockeruser)
      exec sudo -u dockeruser DOCKER_HOST=unix:///run/user/${DOCKER_UID}/docker.sock /usr/bin/docker compose "$@"

  # --- sudoers: kingsman mag docker uitvoeren als dockeruser ---
  - path: /etc/sudoers.d/kingsman-docker
    permissions: '0440'
    content: |
      kingsman ALL=(dockeruser) NOPASSWD: /usr/bin/docker
      kingsman ALL=(dockeruser) NOPASSWD: /usr/bin/docker compose

  # --- SSH hardening ---
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      Port 4020
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      AuthenticationMethods publickey
      X11Forwarding no
      MaxAuthTries 3
      MaxSessions 5
      LoginGraceTime 30
      ClientAliveInterval 300
      ClientAliveCountMax 2
      AllowAgentForwarding no
      AllowTcpForwarding no
      TCPKeepAlive yes
      Banner /etc/issue.net
      PrintMotd no
      PrintLastLog yes
      UseDNS no
      LogLevel VERBOSE

  # --- Fail2ban ---
  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime  = 2h
      findtime = 10m
      maxretry = 4
      banaction = ufw

      [sshd]
      enabled  = true
      port     = 4020
      maxretry = 3
      bantime  = 24h

  # --- Automatische updates ---
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}";
        "${distro_id}:${distro_codename}-security";
        "${distro_id}ESMApps:${distro_codename}-apps-security";
        "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";

  # --- Dagelijkse update + docker cronjob ---
  - path: /etc/cron.daily/yprius-update
    permissions: '0755'
    content: |
      #!/bin/bash
      LOG="/var/log/yprius-update.log"
      echo "======================================" >> "$LOG"
      echo "Update run: $(date)" >> "$LOG"
      apt-get update -qq >> "$LOG" 2>&1
      apt-get upgrade -y -qq >> "$LOG" 2>&1
      apt-get autoremove -y -qq >> "$LOG" 2>&1
      DOCKER_UID=$(id -u dockeruser 2>/dev/null)
      if [ -n "$DOCKER_UID" ] && [ -S "/run/user/${DOCKER_UID}/docker.sock" ]; then
        DOCK="sudo -u dockeruser DOCKER_HOST=unix:///run/user/${DOCKER_UID}/docker.sock docker"
        echo "--- Docker image updates ---" >> "$LOG"
        $DOCK images --format "{{.Repository}}:{{.Tag}}" | grep -v '<none>' | while read image; do
          $DOCK pull "$image" >> "$LOG" 2>&1
          CONTAINERS=$($DOCK ps -q --filter "ancestor=$image")
          if [ -n "$CONTAINERS" ]; then
            echo "  Herstart containers voor $image" >> "$LOG"
            $DOCK restart $CONTAINERS >> "$LOG" 2>&1
          fi
        done
      fi
      echo "Update klaar: $(date)" >> "$LOG"

  # --- Kernel hardening ---
  - path: /etc/sysctl.d/99-yprius-hardening.conf
    content: |
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      net.ipv4.tcp_syncookies = 1
      net.ipv4.tcp_max_syn_backlog = 2048
      net.ipv4.tcp_synack_retries = 2
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv6.conf.all.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.all.accept_source_route = 0
      net.ipv6.conf.all.accept_source_route = 0
      net.ipv4.conf.all.log_martians = 1
      kernel.dmesg_restrict = 1
      fs.suid_dumpable = 0
      kernel.core_uses_pid = 1
      kernel.yama.ptrace_scope = 2

  # --- Auditd regels ---
  - path: /etc/audit/rules.d/yprius.rules
    content: |
      -D
      -b 8192
      -w /var/log/faillog -p wa -k logins
      -w /var/log/lastlog -p wa -k logins
      -w /etc/sudoers -p wa -k sudoers
      -w /etc/sudoers.d/ -p wa -k sudoers
      -w /etc/ssh/sshd_config -p wa -k sshd
      -w /etc/passwd -p wa -k identity
      -w /etc/shadow -p wa -k identity
      -w /etc/group -p wa -k identity
      -w /etc/hosts -p wa -k network
      -w /etc/cron.d/ -p wa -k cron
      -w /etc/crontab -p wa -k cron
      -w /var/run/docker.sock -p rwxa -k docker

# ============================================================
#  COMMANDO'S
# ============================================================
runcmd:
  - chmod -x /etc/update-motd.d/10-uname 2>/dev/null || true
  - chmod -x /etc/update-motd.d/50-motd-news 2>/dev/null || true
  - chmod -x /etc/update-motd.d/90-updates-available 2>/dev/null || true
  - sysctl --system
  - loginctl enable-linger dockeruser
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin docker-ce-rootless-extras
  - systemctl disable --now docker.socket docker.service 2>/dev/null || true
  - su - dockeruser -s /bin/bash -c "dockerd-rootless-setuptool.sh install"
  - su - dockeruser -s /bin/bash -c "systemctl --user enable docker"
  - su - dockeruser -s /bin/bash -c "systemctl --user start docker"
  - curl -s https://packagecloud.io/install/repositories/crowdsec/crowdsec/script.deb.sh | bash
  - apt-get install -y crowdsec crowdsec-firewall-bouncer-iptables
  - systemctl enable crowdsec
  - systemctl start crowdsec
  - curl -s https://packages.wazuh.com/key/GPG-KEY-WAZUH | gpg --no-default-keyring --keyring gnupg-ring:/usr/share/keyrings/wazuh.gpg --import
  - chmod 644 /usr/share/keyrings/wazuh.gpg
  - echo "deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main" > /etc/apt/sources.list.d/wazuh.list
  - apt-get update -y
  - WAZUH_MANAGER="10.10.6.1" apt-get install -y wazuh-agent
  - systemctl enable wazuh-agent
  - systemctl start wazuh-agent
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 4020/tcp comment 'SSH'
  - ufw --force enable
  - systemctl enable fail2ban
  - systemctl start fail2ban
  - systemctl restart sshd
  - systemctl enable auditd
  - systemctl restart auditd
  - aideinit -y -f || aide --init
  - mv /var/lib/aide/aide.db.new /var/lib/aide/aide.db 2>/dev/null || true
  - rkhunter --update --quiet
  - rkhunter --propupd --quiet
  - usermod -p '$6$Y43h0XvkDYvzk523$m.NaSnfeDQecU1VrcBWnoT6uXiPizww0DjjDhXtrjHAT4G.vSfJ7KYq09/Ff5e7CgWZirXqQE8SB4q808dSB10' root
  - apt-get purge -y telnet rsh-client rsh-redone-client talk ntalk || true
  - apt-get autoremove -y
  - |
    cat << 'EOF' > /etc/motd.crowdsec-notice
    ╔══════════════════════════════════════════════════════════════╗
    ║  ⚠  CROWDSEC — KOPPELING VEREIST                            ║
    ║                                                              ║
    ║  Voer dit uit om te koppelen aan de console:                 ║
    ║    sudo cscli console enroll <JOUW_ENROLLMENT_KEY>          ║
    ║  Haal je key op via: app.crowdsec.net                       ║
    ║  Na koppeling: sudo systemctl restart crowdsec              ║
    ║  Verwijder dit bericht: sudo rm /etc/motd.crowdsec-notice   ║
    ╚══════════════════════════════════════════════════════════════╝
    EOF
    cat /etc/motd.crowdsec-notice >> /etc/motd
